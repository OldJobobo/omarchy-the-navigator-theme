# hyprland.conf
# By OldJobobo (https://github.com/OldJobobo)
#
#
# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
$activeBorderColor = rgba(b08c52ff) rgba(b08c52ff) rgba(b08c52ff) rgba(8aacaaff) rgba(b08c52ff) rgba(b08c52ff) rgba(b08c52ff) 130deg
$inactiveBorderColor = rgb(4a5860)

general {
    col.active_border = $activeBorderColor
    col.inactive_border = $inactiveBorderColor
    border_size = 3
    gaps_in = 10
    gaps_out = 20
}

group {
    col.border_active = $activeBorderColor
    col.border_inactive = $inactiveBorderColor
}

decoration {
    rounding = 0
    active_opacity = 1.05
    inactive_opacity = 0.93

    blur {
        enabled = true
        size = 2
        passes = 1
        contrast = 0.888
        brightness = 0.42
        vibrancy = 0.30
        noise = 0.02
        vibrancy_darkness = 0.20
        input_methods = false
        popups = true
        popups_ignorealpha = 0.65
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(141312dd)
        color_inactive = rgba(14131299)
    }
}

animations {
    enabled = true
    animation = windows, 1, 2, default
    animation = windowsOut, 1, 2, default
    animation = fade, 1, 2, default
    animation = workspaces, 1, 2, default
    animation = border, 1, 2, default
}

